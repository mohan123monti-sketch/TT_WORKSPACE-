<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Turf | Creator Slate</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .slate-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      padding: 0 24px 24px;
    }
    .event-item {
      padding: 16px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
    }
    .event-date {
      min-width: 60px;
      text-align: center;
      border-right: 1px solid var(--border);
      padding-right: 16px;
    }
    .gear-item {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .gear-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .gear-available { background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
    .gear-in_use    { background: var(--accent-orange); box-shadow: 0 0 10px var(--accent-orange); }
    .gear-broken    { background: var(--accent-secondary); box-shadow: 0 0 10px var(--accent-secondary); }
    @media (max-width: 1200px) {
      .slate-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="three-bg"></canvas>
  <div class="toast-container" id="toast-container"></div>

  <div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">TECH TURF</div>
      </div>
      <nav class="sidebar-menu" id="main-sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="menu-item" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span class="menu-text">Logout</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="navbar">
        <div class="nav-left">
          <button id="mobile-toggle" class="mobile-hamburger"><i class="fas fa-bars"></i></button>
          <div class="page-title" style="font-size:1.2rem; margin-left:15px;">CREATOR SLATE</div>
        </div>
        <div class="nav-actions" id="nav-actions-container"></div>
      </header>

      <div class="page-header">
        <div>
          <div class="breadcrumb">Production / Filming / Logistics</div>
          <div class="page-title">THE SLATE HQ</div>
        </div>
        <div class="creator-only">
          <button class="btn-primary" onclick="openModal('new-event-modal')">
            <i class="fas fa-calendar-plus"></i> Add Event
          </button>
          <button class="btn-secondary" onclick="openModal('new-gear-modal')">
            <i class="fas fa-camera"></i> Add Gear
          </button>
        </div>
      </div>

      <div class="slate-grid">
        <div class="glass-card dash-card anim-fade-up">
          <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <div style="font-family:var(--font-display); font-weight:700;">PRODUCTION EVENTS</div>
            <i class="fas fa-clapperboard" style="color:var(--accent-orange);"></i>
          </div>
          <div id="event-list"></div>
        </div>

        <div style="display:flex; flex-direction:column; gap:24px;">
          <div class="glass-card dash-card anim-fade-up">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
              <div style="font-family:var(--font-display); font-weight:700;">GEAR CHECKLIST</div>
              <i class="fas fa-camera" style="color:var(--accent-pink);"></i>
            </div>
            <div id="gear-list"></div>
          </div>

          <div class="glass-card dash-card anim-fade-up">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
              <div style="font-family:var(--font-display); font-weight:700;">NEXUS CLIPS (AI)</div>
              <i class="fas fa-scissors" style="color:var(--accent-primary);"></i>
            </div>
            <div style="font-size:0.75rem; color:var(--text-muted); margin-bottom:15px;">Automate high-impact clip generation from any task submission.</div>
            <div class="form-group">
              <label>Source Submission</label>
              <select class="form-control" id="clips-submission-id"></select>
            </div>
            <button class="btn-secondary" style="width:100%; font-size:0.7rem;" onclick="generateNexusClips()">GENERATE CLIPS FROM RECENT</button>
            <div id="clips-result" style="margin-top:20px;"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal" id="new-event-modal">
    <div class="glass-card modal-content">
      <div class="modal-header">
        <div class="modal-title">ADD EVENT</div>
        <i class="fas fa-times close-modal" onclick="closeModal('new-event-modal')"></i>
      </div>
      <form id="new-event-form">
        <div class="form-group"><label>Title</label><input type="text" class="form-control" id="event-title" required></div>
        <div class="form-group"><label>Description</label><textarea class="form-control" id="event-desc" rows="3"></textarea></div>
        <div class="form-group"><label>Start</label><input type="datetime-local" class="form-control" id="event-start" required></div>
        <div class="form-group"><label>End</label><input type="datetime-local" class="form-control" id="event-end"></div>
        <div class="form-group"><label>Location</label><input type="text" class="form-control" id="event-location" placeholder="Studio A / Remote / On-site"></div>
        <button type="submit" class="btn-primary" style="width:100%;">Save Event</button>
      </form>
    </div>
  </div>

  <div class="modal" id="new-gear-modal">
    <div class="glass-card modal-content">
      <div class="modal-header">
        <div class="modal-title">ADD GEAR</div>
        <i class="fas fa-times close-modal" onclick="closeModal('new-gear-modal')"></i>
      </div>
      <form id="new-gear-form">
        <div class="form-group"><label>Name</label><input type="text" class="form-control" id="gear-name" required></div>
        <div class="form-group"><label>Condition</label><input type="text" class="form-control" id="gear-condition" placeholder="Good / Needs battery / Service due"></div>
        <button type="submit" class="btn-primary" style="width:100%;">Add Gear</button>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/three-bg.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/creator-slate.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      auth.requireAuth();
      auth.initNavbar();
      initThreeBg();
      initSidebar();
      if(window.initCreatorSlate) initCreatorSlate();
    });
  </script>
</body>
</html>
