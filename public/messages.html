<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Turf | Team Messenger</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .messenger-shell {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      padding: 0 24px 24px;
      min-height: calc(100vh - 180px);
    }

    .messenger-panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .messenger-sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .messenger-section {
      padding: 18px;
      border-bottom: 1px solid var(--border);
    }

    .messenger-section-title {
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .messenger-search {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: var(--font-mono);
      margin-bottom: 12px;
      outline: none;
    }

    .select-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 250px;
      overflow-y: auto;
    }

    .select-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      background: rgba(255, 255, 255, 0.03);
    }

    .select-item:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.06);
    }

    .select-item.active {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 1px rgba(90, 115, 255, 0.25) inset;
    }

    .select-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .select-meta {
      min-width: 0;
      flex: 1;
    }

    .select-name {
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .select-subtitle {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-board {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .chat-board-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .chat-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 800;
    }

    .chat-subtitle {
      color: var(--text-muted);
      font-size: 0.72rem;
      margin-top: 4px;
    }

    .chat-stream {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 320px;
    }

    .message-bubble {
      max-width: 72%;
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.45;
      font-size: 0.9rem;
      word-break: break-word;
    }

    .message-bubble.self {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent-primary), #7c4dff);
      color: #fff;
    }

    .message-bubble.other {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }

    .message-meta {
      font-size: 0.65rem;
      opacity: 0.75;
      margin-top: 6px;
      font-family: var(--font-mono);
    }

    .composer {
      padding: 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .composer textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
      padding: 12px 14px;
      font-family: inherit;
      outline: none;
    }

    .team-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .team-chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.7rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.04);
    }

    .team-chip.active {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .empty-state-lite {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    @media (max-width: 1100px) {
      .messenger-shell {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <canvas id="three-bg"></canvas>
  <div class="toast-container" id="toast-container"></div>

  <div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">TECH TURF</div>
      </div>
      <nav class="sidebar-menu" id="main-sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="menu-item" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span class="menu-text">Logout</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="navbar">
        <div class="nav-left">
          <button id="mobile-toggle" class="mobile-hamburger"><i class="fas fa-bars"></i></button>
          <div class="page-title" style="font-size:1.2rem; margin-left:15px;">TEAM MESSENGER</div>
        </div>
        <div class="nav-actions" id="nav-actions-container"></div>
      </header>

      <div class="page-header">
        <div>
          <div class="breadcrumb">Communication / Teams</div>
          <div class="page-title">DIRECT OR GROUP CHAT</div>
        </div>
        <div style="font-size:0.75rem; color:var(--accent-primary);">
          <i class="fas fa-circle" style="font-size:0.5rem; margin-right:5px;"></i> LIVE MESSAGING
        </div>
      </div>

      <div class="messenger-shell">
        <section class="messenger-panel messenger-sidebar">
          <div class="messenger-section">
            <div class="messenger-section-title">Compose</div>
            <input class="messenger-search" id="chat-title" type="text" placeholder="Optional group name">
            <input class="messenger-search" id="user-search" type="text" placeholder="Search people or teams">
            <div class="team-chip-row" id="selected-summary"></div>
            <div style="display:flex; gap:10px; margin-top:12px;">
              <button class="btn-primary" id="start-chat-btn" style="flex:1;">Start Chat</button>
              <button class="btn-secondary" id="clear-selection-btn" style="flex:1;">Clear</button>
            </div>
          </div>

          <div class="messenger-section">
            <div class="messenger-section-title">Recent Chats</div>
            <div class="select-list" id="conversations-list"></div>
          </div>

          <div class="messenger-section">
            <div class="messenger-section-title">Teams</div>
            <div class="select-list" id="teams-list"></div>
          </div>

          <div class="messenger-section" style="border-bottom:none; flex:1; min-height:0; display:flex; flex-direction:column;">
            <div class="messenger-section-title">People</div>
            <div class="select-list" id="people-list" style="flex:1;"></div>
          </div>
        </section>

        <section class="messenger-panel chat-board">
          <div class="chat-board-header">
            <div>
              <div class="chat-title" id="active-chat-title">No conversation selected</div>
              <div class="chat-subtitle" id="active-chat-meta">Choose a conversation or start a new one.</div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="text" id="conversation-search" class="messenger-search" style="margin:0; width:220px;" placeholder="Search in this chat">
              <div class="badge badge-normal" id="active-chat-badge" style="font-size:0.65rem; display:none;">CHAT</div>
            </div>
          </div>
          <div class="chat-stream" id="chat-stream">
            <div class="empty-state-lite">Open a chat from the left panel or start a new direct/group chat.</div>
          </div>
          <div class="composer">
            <textarea id="message-input" placeholder="Write a message..." disabled></textarea>
            <input type="file" id="message-attachment" style="max-width:200px;" title="Attach file">
            <button class="btn-primary" id="send-message-btn" style="min-width:120px; height:46px;" disabled>Send</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/three-bg.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/messages.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      auth.requireAuth();
      auth.initNavbar();
      initThreeBg();
      initSidebar();
      if (window.initMessages) initMessages();
    });
  </script>
</body>
</html>
