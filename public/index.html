<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Turf | Login</title>

  <!-- Performance Optimization: Preconnect to CDNs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://unpkg.com">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    .login-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      text-align: center;
    }

    .login-logo {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 2.5rem;
      color: var(--accent-primary);
      text-shadow: 0 0 20px rgba(108, 99, 255, 0.5);
      margin-bottom: 8px;
      letter-spacing: 3px;
    }

    .login-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 40px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .input-wrap input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px 12px 44px;
      color: var(--text-primary);
      transition: 0.3s;
    }

    .input-wrap input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 15px rgba(108, 99, 255, 0.2);
    }

    .forgot-pw {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 16px;
    }

    .forgot-pw a:hover {
      color: var(--accent-primary);
    }

    .top-right-nav {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
    }

    .top-right-nav .btn-secondary {
      padding: 10px 20px;
      font-size: 0.75rem;
      border-color: rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .top-right-nav .btn-secondary:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }
  </style>
</head>

<body>
  <canvas id="three-bg"></canvas>
  <div class="toast-container" id="toast-container"></div>

  <div class="top-right-nav">
    <button class="btn-secondary" onclick="window.location.href='client-portal.html'">
      <i class="fas fa-handshake"></i>
      <span>CLIENT CONNECT</span>
    </button>
  </div>

  <div class="login-container">
    <div class="glass-card login-card anim-fade-up">
      <div class="login-logo">TECH TURF</div>
      <div class="login-subtitle">Internal Platform</div>

      <form class="login-form" id="login-form">
        <div class="input-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="name@techturf.com" required>
          </div>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="login-btn">
          <span>Sign In</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="forgot-pw">
        Forgot password? <a href="#">Contact IT Support</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/three-bg.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initThreeBg();

      if (auth.isLoggedIn()) {
        window.location.href = 'dashboard.html';
      }

      document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

        try {
          const res = await api.post('/auth/login', { email, password });
          auth.setToken(res.token);
          auth.setUser(res.user);
          showToast('Welcome back, ' + res.user.name, 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 1000);
        } catch (err) {
          showToast(err.message, 'error');
          btn.disabled = false;
          btn.innerHTML = '<span>Sign In</span> <i class="fas fa-arrow-right"></i>';
        }
      };
    });
  </script>
</body>

</html>
