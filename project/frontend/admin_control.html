<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Turf | Admin Warp</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    .admin-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      padding: 0 24px 24px;
      align-items: start;
    }

    /* Left column stretches full */
    .audit-col {
      display: flex;
      flex-direction: column;
    }

    .audit-col .glass-card {
      flex: 1;
    }

    .warp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .warp-table th {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.7rem;
    }

    .warp-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Role Accordion ─────────────────────────────────────────────── */
    .role-accordion {
      margin-bottom: 10px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: border-color 0.25s;
    }

    .role-accordion.active {
      border-color: var(--accent-primary);
    }

    .role-acc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-left: 4px solid var(--accent-primary);
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      transition: background 0.2s;
    }

    .role-acc-header:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .role-acc-name {
      font-weight: 900;
      font-family: var(--font-display);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .role-acc-count {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .role-acc-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .role-acc-icon {
      opacity: 0.3;
      font-size: 0.9rem;
    }

    .role-acc-chevron {
      font-size: 0.75rem;
      color: var(--text-muted);
      transition: transform 0.3s ease;
    }

    .role-acc-chevron.rotated {
      transform: rotate(180deg);
    }

    /* Animated body */
    .role-acc-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.2s;
      background: rgba(0, 0, 0, 0.15);
    }

    .role-acc-body.open {
      max-height: 500px;
    }

    /* User rows inside accordion */
    .role-acc-user {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      transition: background 0.15s;
    }

    .role-acc-user:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .role-acc-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.7rem;
      font-family: var(--font-display);
      flex-shrink: 0;
    }

    .role-acc-uname {
      font-size: 0.78rem;
      font-weight: 700;
    }

    .role-acc-email {
      font-size: 0.65rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .role-acc-empty {
      padding: 14px 16px;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Link Notes Widget */
    .link-notes-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .link-notes-input-row input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .link-notes-input-row input:focus {
      border-color: var(--accent-primary);
    }

    .link-notes-add-btn {
      background: var(--accent-primary);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .link-notes-add-btn:hover {
      opacity: 0.8;
    }

    .link-notes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .link-note-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      transition: background 0.2s;
    }

    .link-note-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .link-note-icon {
      color: var(--accent-pink);
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .link-note-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      min-width: 60px;
    }

    .link-note-url {
      font-size: 0.72rem;
      font-family: var(--font-mono);
      color: var(--accent-primary);
      text-decoration: none;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-note-url:hover {
      text-decoration: underline;
    }

    .link-note-del {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .link-note-del:hover {
      color: var(--accent-orange);
    }

    .link-notes-empty {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-family: var(--font-mono);
    }

    /* Layout helpers */
    .nav-page-title {
      font-size: 1.2rem;
      margin-left: 15px;
    }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-header-row--sm {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-family: var(--font-display);
      font-weight: 700;
    }

    .icon-orange {
      color: var(--accent-orange);
    }

    .icon-pink {
      color: var(--accent-pink);
    }

    .icon-primary {
      color: var(--accent-primary);
    }

    .audit-col-inner {
      flex: 1;
      overflow-y: auto;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .label-input-sm {
      max-width: 90px;
    }

    @media (max-width: 1200px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <canvas id="three-bg"></canvas>
  <div class="toast-container" id="toast-container"></div>

  <div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">TECH TURF</div>
      </div>
      <nav class="sidebar-menu" id="main-sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="menu-item" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span class="menu-text">Logout</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="navbar">
        <div class="nav-left">
          <button id="mobile-toggle" class="mobile-hamburger" title="Toggle sidebar" aria-label="Toggle sidebar"><i
              class="fas fa-bars"></i></button>
          <div class="page-title nav-page-title">ADMIN CONTROL CENTER</div>
        </div>
        <div class="nav-actions" id="nav-actions-container"></div>
      </header>

      <div class="page-header">
        <div>
          <div class="breadcrumb">Admin / Security / Warp</div>
          <div class="page-title">AUDIT WARP & RELICS</div>
        </div>
      </div>

      <div class="admin-grid">
        <div class="glass-card dash-card anim-fade-up audit-col">
          <div class="card-header-row">
            <div class="card-title">AUDIT SNAPSHOTS (WARP)</div>
            <i class="fas fa-history icon-orange"></i>
          </div>
          <div class="audit-col-inner">
            <table class="warp-table" id="audit-table">
              <thead>
                <tr>
                  <th>Timestamp</th>
                  <th>Operative</th>
                  <th>Action</th>
                  <th>Target</th>
                  <th>Control</th>
                </tr>
              </thead>
              <tbody id="audit-list"></tbody>
            </table>
          </div>
        </div>

        <div class="right-col">
          <div class="glass-card dash-card anim-fade-up">
            <div class="card-header-row--sm">
              <div class="card-title">LINK NOTES</div>
              <i class="fas fa-link icon-pink"></i>
            </div>
            <div class="link-notes-input-row">
              <input type="text" id="link-note-label" placeholder="Label" class="label-input-sm" />
              <input type="url" id="link-note-url" placeholder="https://..." />
              <button class="link-notes-add-btn" onclick="addLinkNote()" title="Add link" aria-label="Add link"><i
                  class="fas fa-plus"></i></button>
            </div>
            <div class="link-notes-list" id="link-notes-list"></div>
          </div>

          <div class="glass-card dash-card anim-fade-up">
            <div class="card-header-row">
              <div class="card-title">ROLE ARCHITECT</div>
              <i class="fas fa-crown icon-primary"></i>
            </div>
            <div id="role-list"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/three-bg.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/admin-control.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      auth.requireAuth();
      auth.requireRole('admin');
      auth.initNavbar();
      initThreeBg();
      initSidebar();
      if (window.initAdminControl) initAdminControl();
    });
  </script>
</body>

</html>
