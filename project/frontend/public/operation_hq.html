<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Turf | Operation HQ</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .hq-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 0 24px 24px;
    }
    .forecast-card {
      padding: 24px;
      border-left:  2px solid var(--accent-primary);
    }
    .progress-track {
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin: 15px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      box-shadow: 0 0 15px var(--accent-primary);
    }
    @media (max-width: 1024px) {
      .hq-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="three-bg"></canvas>
  <div class="toast-container" id="toast-container"></div>

  <div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">TECH TURF</div>
      </div>
      <nav class="sidebar-menu" id="main-sidebar-nav">
        <div class="menu-item" data-nav="dashboard.html">
          <i class="fas fa-th-large"></i>
          <span class="menu-text">Command Center</span>
        </div>
        <div class="menu-item" data-nav="projects.html">
          <i class="fas fa-project-diagram"></i>
          <span class="menu-text">Operations</span>
        </div>
        <div class="menu-item" data-nav="tasks.html">
          <i class="fas fa-tasks"></i>
          <span class="menu-text">Task Stream</span>
        </div>
        <div class="menu-item tl-only" data-nav="submissions.html">
          <i class="fas fa-check-double"></i>
          <span class="menu-text">Directives</span>
        </div>
        <div class="menu-item" data-nav="drive.html">
          <i class="fas fa-hdd"></i>
          <span class="menu-text">Secure Drive</span>
        </div>

        <hr style="border:0; border-top:2px solid var(--border); margin:10px 0; opacity:0.3;">
        
        <!-- Role Hubs -->
        <div class="menu-item admin-only" data-nav="users.html">
          <i class="fas fa-users-cog"></i>
          <span class="menu-text">User Management</span>
        </div>
        <div class="menu-item admin-only" data-nav="admin_control.html">
          <i class="fas fa-shield-alt"></i>
          <span class="menu-text">Admin Warp</span>
        </div>
        
        <div class="menu-item rnd-only" data-nav="nexus_lab.html">
          <i class="fas fa-flask"></i>
          <span class="menu-text">Nexus Lab</span>
        </div>
        
        
        
        
        <div class="menu-item handler-only" data-nav="client_connect.html">
          <i class="fas fa-handshake"></i>
          <span class="menu-text">Client Connect</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="menu-item" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span class="menu-text">Logout</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="navbar">
        <div class="nav-left">
          <button id="mobile-toggle" class="mobile-hamburger"><i class="fas fa-bars"></i></button>
          <div class="page-title" style="font-size:1.2rem; margin-left:15px;">OPERATION HQ</div>
        </div>
        <div class="nav-actions" id="nav-actions-container"></div>
      </header>

      <div class="page-header">
        <div>
          <div class="breadcrumb">TL / Management / Forecasting</div>
          <div class="page-title">THE COMMAND BRIDGE</div>
        </div>
      </div>

      <div class="hq-grid">
        <div class="glass-card dash-card anim-fade-up">
           <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <div style="font-family:var(--font-display); font-weight:700;">NEXUS FORECASTING</div>
            <i class="fas fa-brain" style="color:var(--accent-primary);"></i>
          </div>
          <div class="form-group">
            <label>Target Project</label>
            <select class="form-control" id="forecast-project-id"></select>
          </div>
          <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="runForecasting()">CALCULATE PREDICTIVE DELIVERY</button>
          <div id="forecast-result" style="margin-top:20px; display:none;"></div>
        </div>

        <div class="glass-card dash-card anim-fade-up">
           <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <div style="font-family:var(--font-display); font-weight:700;">BLITZ ASSIGN</div>
            <i class="fas fa-bolt" style="color:var(--accent-orange);"></i>
          </div>
          <div style="font-size:0.75rem; color:var(--text-muted); margin-bottom:15px;">Instantly distribute unassigned tasks across active agents.</div>
          <div class="form-group">
            <label>Target Project</label>
             <select class="form-control" id="blitz-project-id"></select>
          </div>
          <button class="btn-secondary" style="width:100%; margin-top:10px;" onclick="runBlitzAssign()">INITIATE BLITZ REDISTRIBUTION</button>
          <div id="blitz-result" style="margin-top:20px; font-size:0.75rem;"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/three-bg.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/operation-hq.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      auth.requireAuth();
      auth.initNavbar();
      initThreeBg();
      initSidebar();
      if(window.initOperationHQ) initOperationHQ();
    });
  </script>
</body>
</html>
