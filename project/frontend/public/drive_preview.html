<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Turf | Drive Preview</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: var(--bg-primary); min-height: 100vh; }
    .preview-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 16px;
    }
    .preview-card {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
    }
    .preview-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .preview-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      word-break: break-word;
    }
    .preview-meta {
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .preview-stage {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 16px;
      height: calc(100vh - 220px);
      min-height: 520px;
      overflow: auto;
      padding: 0;
      display: block;
    }
    .preview-stage img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }
    .preview-stage iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .preview-stage video {
      width: 100%;
      height: 100%;
      max-height: 100%;
      background: #000;
      border-radius: 12px;
      display: block;
    }
    .preview-text {
      width: 100%;
      white-space: pre-wrap;
      line-height: 1.7;
      color: #111827;
      font-family: var(--font-body);
      font-size: 1rem;
      padding: 20px;
      min-height: 100%;
      max-height: 100%;
      overflow: auto;
      box-sizing: border-box;
    }
    .preview-note {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="preview-shell">
    <div class="glass-card preview-card">
      <div class="preview-top">
        <div>
          <div class="preview-title" id="preview-title">Loading preview...</div>
          <div class="preview-meta" id="preview-meta"></div>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn-secondary" id="open-original-btn">Open File</button>
          <button class="btn-primary" id="close-btn">Close Tab</button>
        </div>
      </div>
      <div class="preview-note" id="preview-note"></div>
      <div class="preview-stage" id="preview-stage">
        <div class="text-muted">Loading...</div>
      </div>
    </div>
  </div>

  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script>
    const stage = document.getElementById('preview-stage');
    const titleEl = document.getElementById('preview-title');
    const metaEl = document.getElementById('preview-meta');
    const noteEl = document.getElementById('preview-note');
    const params = new URLSearchParams(window.location.search);
    const itemId = params.get('id');

    function renderError(message) {
      stage.innerHTML = `<div class="text-danger" style="text-align:center;">${message}</div>`;
      noteEl.textContent = '';
    }

    const activeBlobUrls = [];
    function trackObjectUrl(url) {
      activeBlobUrls.push(url);
      return url;
    }
    function clearObjectUrls() {
      while (activeBlobUrls.length) {
        URL.revokeObjectURL(activeBlobUrls.pop());
      }
    }

    document.getElementById('close-btn').onclick = () => window.close();
    document.getElementById('open-original-btn').onclick = async () => {
      if (!itemId) return;
      const token = auth.getToken();
      const url = `/api/drive/download/${itemId}?token=${encodeURIComponent(token || '')}`;
      window.open(url, '_blank');
    };

    async function loadPreview() {
      if (!itemId) {
        renderError('Missing file id.');
        return;
      }

        const token = auth.getToken();
        if (!token) {
          renderError('Session missing. Please sign in again.');
          return;
        }

      try {
        const res = await fetch(`${api.BASE}/drive/preview-data/${itemId}`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || data.message || 'Preview unavailable');

        titleEl.textContent = data.title || 'Drive Preview';
        metaEl.textContent = data.note || '';
        stage.innerHTML = '';

          if (data.kind === 'image' || data.kind === 'pdf' || data.kind === 'video') {
          const fileRes = await fetch(data.previewUrl, {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (!fileRes.ok) throw new Error(`Unable to load ${data.kind} preview`);
          const blob = await fileRes.blob();
          if (!blob.size) throw new Error('Preview file was empty');
          const objectUrl = trackObjectUrl(URL.createObjectURL(blob));

          if (data.kind === 'image') {
            const img = document.createElement('img');
            img.src = objectUrl;
            img.alt = 'Drive Preview';
            img.loading = 'eager';
            img.onerror = () => renderError('Image preview could not be rendered.');
            stage.appendChild(img);
          } else {
            if (data.kind === 'video') {
              const video = document.createElement('video');
              video.src = objectUrl;
              video.controls = true;
              video.autoplay = false;
              video.playsInline = true;
              video.style.width = '100%';
              video.style.maxHeight = '78vh';
              video.onerror = () => renderError('Video preview could not be rendered.');
              stage.appendChild(video);
              noteEl.textContent = 'Video preview loaded from secure storage.';
              return;
            }
            const iframe = document.createElement('iframe');
            iframe.src = objectUrl;
            iframe.title = 'PDF Preview';
            iframe.onerror = () => renderError('PDF preview could not be rendered.');
            stage.appendChild(iframe);
          }
          noteEl.textContent = 'Preview loaded from secure storage.';
        } else if (data.kind === 'text') {
          const pre = document.createElement('div');
          pre.className = 'preview-text';
          pre.textContent = data.previewText || '';
          stage.appendChild(pre);
          noteEl.textContent = data.note || 'Document text preview.';
        } else {
          stage.innerHTML = `<div class="text-muted" style="text-align:center;">${data.note || 'Preview not available for this file type.'}</div>`;
          noteEl.textContent = 'Use Open File to download the original.';
        }
      } catch (err) {
        renderError(err.message || 'Preview failed');
      }
    }

    window.addEventListener('beforeunload', clearObjectUrls);

    document.addEventListener('DOMContentLoaded', loadPreview);
  </script>
</body>
</html>
