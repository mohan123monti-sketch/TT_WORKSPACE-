<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Turf | Nexus AI Terminal</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 180px);
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(10, 10, 20, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .chat-messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.9rem;
      position: relative;
    }
    .msg-nexus {
      align-self: flex-start;
      background: var(--bg-card);
      border-left: 3px solid var(--accent-pink);
      color: #fff;
    }
    .msg-user {
      align-self: flex-end;
      background: var(--accent-primary);
      color: #fff;
    }
    .chat-input-area {
      padding: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }
    .chat-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-family: inherit;
    }
    .typing-indicator {
      font-style: italic;
      color: var(--accent-pink);
      font-size: 0.8rem;
      margin-top: 5px;
      display: none;
    }
    /* Nexus Pulse Animation */
    @keyframes nexus-pulse {
      0% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0.5; transform: scale(1); }
    }
    .nexus-avatar {
      width: 32px;
      height: 32px;
      background: radial-gradient(circle, var(--accent-pink), var(--accent-primary));
      border-radius: 50%;
      margin-bottom: 8px;
      animation: nexus-pulse 2s infinite ease-in-out;
    }
  </style>
</head>
<body>
  <canvas id="three-bg"></canvas>
  <div class="toast-container" id="toast-container"></div>

  <div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">TECH TURF</div>
      </div>
      <nav class="sidebar-menu" id="main-sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="menu-item" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span class="menu-text">Logout</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="navbar">
        <div class="nav-left">
          <button id="mobile-toggle" class="mobile-hamburger"><i class="fas fa-bars"></i></button>
          <div class="page-title" style="font-size:1.2rem; margin-left:15px;">NEXUS AI TERMINAL</div>
        </div>
        <div class="nav-actions" id="nav-actions-container"></div>
      </header>

      <div class="page-header">
        <div>
          <div class="breadcrumb">Intelligence / AI Chat</div>
          <div class="page-title">CONVERSE WITH NEXUS</div>
        </div>
        <div style="font-size:0.75rem; text-align:right; color:var(--accent-pink);">
          <i class="fas fa-circle" style="font-size:0.5rem; margin-right:5px;"></i> SYSTEM ONLINE
        </div>
      </div>

      <div class="chat-container anim-fade-up">
        <div class="chat-messages" id="chat-messages">
          <div class="msg msg-nexus">
            <div class="nexus-avatar"></div>
            Greetings, Operative. I am **Nexus**, the organizational intelligence of Tech Turf. How can I assist you with your operations today?
          </div>
        </div>
        <div class="chat-input-area">
          <div style="flex:1;">
            <input type="text" class="chat-input" id="chat-input" placeholder="Enter objective or query for Nexus AI...">
            <div class="typing-indicator" id="typing-indicator">Nexus is processing command...</div>
          </div>
          <button class="btn-primary" id="send-btn" style="padding:0 24px;"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/three-bg.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/nexus-chat.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      auth.initNavbar();
      initThreeBg();
      initSidebar();
      if(window.initNexusChat) initNexusChat();
    });
  </script>
</body>
</html>
