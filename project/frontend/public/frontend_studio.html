<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Studio | Tech Turf</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
      <!-- Sidebar content (reuse from dashboard/sidebar) -->
      <div class="sidebar-header">TECH TURF</div>
      <nav class="sidebar-menu">
        <div class="menu-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-th-large"></i><span class="menu-text">Dashboard</span></div>
        <div class="menu-item active" onclick="window.location.href='frontend_studio.html'"><i class="fas fa-laptop-code"></i><span class="menu-text">Frontend Studio</span></div>
        <!-- ...other menu items... -->
      </nav>
    </aside>
    <main class="main-content">
      <header class="navbar">
        <div class="nav-left">
          <div class="page-title">FRONTEND STUDIO</div>
        </div>
      </header>
      <div class="studio-grid">
        <section class="studio-section" id="sprint-board">
          <h2>Sprint Board</h2>
          <div id="sprint-board-tasks"></div>
        </section>
        <section class="studio-section" id="release-checklist">
          <h2>Release Checklist</h2>
          <ul id="release-checklist-list"></ul>
        </section>
        <section class="studio-section" id="accessibility-scan">
          <h2>Accessibility Scan</h2>
          <button onclick="runAccessibilityScan()">Run Full Scan</button>
          <div id="accessibility-results"></div>
        </section>
        <section class="studio-section" id="metrics-dashboard">
          <h2>Frontend Metrics</h2>
          <div id="metrics-dashboard-content"></div>
        </section>
      </div>
    </main>
  </div>
  <script src="js/frontend_studio.js" defer></script>
</body>
</html>
