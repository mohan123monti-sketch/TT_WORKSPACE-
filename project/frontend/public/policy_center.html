<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Turf | Policy Center</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    .policy-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 24px;
      padding: 0 24px 24px;
      align-items: start;
    }

    .policy-card {
      padding: 20px;
    }

    .policy-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 400px;
      overflow: auto;
      padding-right: 4px;
    }

    .policy-row {
      border: 2px solid var(--border);
      background: var(--bg-glass);
      border-radius: 10px;
      padding: 12px;
    }

    .policy-row-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .policy-key {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent-primary);
      word-break: break-all;
    }

    .policy-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .policy-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .toggle-grid {
      display: grid;
      gap: 10px;
    }

    .toggle-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: var(--bg-glass);
    }

    /* Policy Docs Section */
    .doc-list {
      display: grid;
      gap: 12px;
    }

    .doc-item {
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: transform 0.2s;
      cursor: pointer;
    }

    .doc-item:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-2px);
    }

    .doc-title {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--accent-secondary);
      margin-bottom: 4px;
    }

    .doc-preview {
      font-size: 0.75rem;
      color: var(--text-muted);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* Reference List Builder */
    .ref-builder {
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .ref-item {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }

    .ref-item input {
      font-size: 0.7rem;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--bg-card);
      border: 2px solid var(--accent-primary);
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      padding: 30px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .modal-ref-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--accent-primary);
      color: #fff;
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.75rem;
      margin: 4px;
    }

    /* UI Layout Classes (Removal of Inline Styles) */
    .policy-col {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sync-loader {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
    }

    .card-title-mb16 {
      margin-bottom: 16px;
    }

    .card-title-mb14 {
      margin-bottom: 14px;
    }

    .full-width-mt20 {
      width: 100%;
      margin-top: 20px;
    }

    .full-width-mt16 {
      width: 100%;
      margin-top: 16px;
    }

    .textarea-resizable {
      resize: vertical;
    }

    .btn-xs {
      font-size: 0.65rem;
      padding: 4px 8px;
    }

    .modal-title-style {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .modal-content-text {
      white-space: pre-wrap;
      margin-bottom: 24px;
    }

    .modal-ref-header {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 0.8rem;
      text-transform: uppercase;
    }

    @media (max-width: 1024px) {
      .policy-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <canvas id="three-bg"></canvas>
  <div class="toast-container" id="toast-container"></div>

  <div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">TECH TURF</div>
      </div>
      <nav class="sidebar-menu" id="main-sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="menu-item" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span class="menu-text">Logout</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="navbar">
        <div class="nav-left">
          <button id="mobile-toggle" class="mobile-hamburger" title="Toggle sidebar"><i
              class="fas fa-bars"></i></button>
          <div class="page-title">POLICY CENTER</div>
        </div>
        <div class="nav-actions" id="nav-actions-container"></div>
      </header>

      <div class="page-header">
        <div>
          <div class="breadcrumb">Admin / Enterprise / Protocols</div>
          <div class="page-title">ENTERPRISE POLICY CENTER</div>
        </div>
      </div>

      <div class="policy-layout">
        <!-- Left: Policy Documents (The text entries) -->
        <div class="policy-col">
          <div class="glass-card policy-card anim-fade-up">
            <div class="card-header-row">
              <div class="card-title">POLICY DOCUMENTS</div>
              <i class="fas fa-file-contract icon-primary"></i>
            </div>
            <div class="doc-list" id="doc-list">
              <!-- Docs rendered here -->
              <div class="sync-loader">Syncing documentation...</div>
            </div>
          </div>

          <div class="glass-card policy-card anim-fade-up">
            <div class="card-title card-title-mb16">WALKTHROUGH CONFIGURATION</div>
            <div class="toggle-grid" id="walkthrough-toggle-grid"></div>
            <button class="btn-secondary full-width-mt20" id="save-walkthrough-toggles">
              <i class="fas fa-sync"></i> Update Globally
            </button>
          </div>
        </div>

        <!-- Right: Creation and Registry -->
        <div class="policy-col">
          <div class="glass-card policy-card anim-fade-up">
            <div class="card-title card-title-mb14">PUBLISH NEW POLICY</div>
            <form id="doc-form">
              <div class="form-group">
                <label>Title</label>
                <input id="doc-title" class="form-control" placeholder="e.g. Remote Work Protocol" required>
              </div>
              <div class="form-group">
                <label>Content</label>
                <textarea id="doc-content" class="form-control textarea-resizable" rows="8"
                  placeholder="Enter policy text..." required></textarea>
              </div>
              <label>References (Optional)</label>
              <div class="ref-builder">
                <div id="ref-items-container">
                  <div class="ref-item">
                    <input class="form-control ref-label" placeholder="Label">
                    <input class="form-control ref-url" placeholder="URL">
                  </div>
                </div>
                <button type="button" class="btn-secondary btn-xs" onclick="addRefRow()">+ Add Reference</button>
              </div>
              <button class="btn-primary full-width-mt16" type="submit"><i class="fas fa-paper-plane"></i> Publish
                Document</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Policy View Modal -->
  <div id="doc-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div id="modal-title" class="modal-title-style"></div>
        <button class="btn-secondary" onclick="closeDocModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div id="modal-content" class="modal-content-text"></div>
        <div class="modal-ref-header">References & Links</div>
        <div id="modal-refs"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/three-bg.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/policy-center.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      auth.requireAuth();
      auth.requireRole('admin');
      auth.initNavbar();
      initThreeBg();
      initSidebar();
      if (window.initPolicyCenter) await initPolicyCenter();
    });
  </script>
</body>

</html>
