<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Turf | Client Connect</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    .connect-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 0 24px 30px;
    }

    .stat-mini-card {
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-mini-val {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent-primary);
      font-family: var(--font-display);
    }

    .stat-mini-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .connect-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
      padding: 0 24px 24px;
    }

    .client-card {
      transition: transform 0.3s, border-color 0.3s;
    }

    .client-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-primary);
    }

    .card-pulse-sec {
      height: 100px;
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .pulse-ring {
      position: absolute;
      width: 70px;
      height: 70px;
      border: 4px solid var(--border);
      border-radius: 50%;
      opacity: 0.1;
    }

    .pulse-value {
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent-primary);
      z-index: 1;
    }

    .pulse-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1px;
      z-index: 1;
    }

    .client-info-strip {
      padding: 18px;
    }

    .client-name {
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--font-display);
      margin-bottom: 4px;
    }

    .client-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 15px;
    }

    .interaction-badge {
      font-size: 0.6rem;
      padding: 3px 8px;
      background: var(--border);
      border-radius: 10px;
      font-weight: 700;
    }

    .pass-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 6px;
      margin-top: 8px;
      font-size: 0.65rem;
      border: 1px solid var(--border);
    }

    .modal-body {
      padding: 24px;
    }

    .log-item {
      padding: 12px;
      border-left: 2px solid var(--accent-primary);
      background: rgba(255, 255, 255, 0.02);
      margin-bottom: 12px;
    }

    .log-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .modal-content-500 {
      max-width: 500px !important;
    }

    .modal-content-600 {
      max-width: 600px !important;
    }

    .modal-form {
      padding: 20px !important;
    }

    .history-scroll {
      max-height: 400px !important;
      overflow-y: auto !important;
    }

    .navbar-title {
      font-size: 1.2rem !important;
      margin-left: 15px !important;
    }

    .search-flex {
      max-width: 300px !important;
    }

    .log-textarea {
      resize: vertical !important;
    }
  </style>
</head>

<body>
  <canvas id="three-bg"></canvas>
  <div class="toast-container" id="toast-container"></div>

  <div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">TECH TURF</div>
      </div>
      <nav class="sidebar-menu" id="main-sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="menu-item" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span class="menu-text">Logout</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="navbar">
        <div class="nav-left">
          <button id="mobile-toggle" class="mobile-hamburger" title="Toggle Navigation"><i
              class="fas fa-bars"></i></button>
          <div class="page-title navbar-title">CLIENT CONNECT</div>
        </div>
        <div class="nav-actions" id="nav-actions-container"></div>
      </header>

      <div class="page-header">
        <div>
          <div class="breadcrumb">Relationship / Pulse / Management</div>
          <div class="page-title">RELATIONSHIP PORTAL</div>
        </div>
        <div class="nav-search search-flex">
          <i class="fas fa-search"></i>
          <input type="text" id="client-search" placeholder="Search clients..." onkeyup="filterClients()">
        </div>
      </div>

      <!-- Stats HUD -->
      <div class="connect-stats">
        <div class="glass-card stat-mini-card">
          <div class="stat-mini-val" id="stat-active-clients">0</div>
          <div class="stat-mini-label">Active Relationships</div>
        </div>
        <div class="glass-card stat-mini-card">
          <div class="stat-mini-val" id="stat-active-passes">0</div>
          <div class="stat-mini-label">Portal Passes Valid</div>
        </div>
        <div class="glass-card stat-mini-card">
          <div class="stat-mini-val" id="stat-recent-interactions">0</div>
          <div class="stat-mini-label">Last 7D Interactions</div>
        </div>
      </div>

      <div class="connect-grid" id="client-list">
        <!-- Injected by JS -->
      </div>
    </main>
  </div>

  <!-- Modal: Interaction Log -->
  <div class="modal" id="modal-interaction">
    <div class="glass-card modal-content modal-content-500">
      <div class="modal-header">
        <div class="modal-title">LOG INTERACTION</div>
        <i class="fas fa-times close-modal" onclick="closeModal('modal-interaction')"></i>
      </div>
      <form id="interaction-form" class="modal-form">
        <input type="hidden" id="log-client-id">
        <div class="form-group">
          <label>Interaction Type</label>
          <select id="log-type" class="form-control" title="Interaction Type">
            <option>Email Update</option>
            <option>Phone Call</option>
            <option>Strategic Meeting</option>
            <option>Project Handover</option>
            <option>Complaint Resolution</option>
          </select>
        </div>
        <div class="form-group">
          <label>Sentiment</label>
          <select id="log-sentiment" class="form-control" title="Sentiment">
            <option value="Positive">Positive ✨</option>
            <option value="Neutral" selected>Neutral 😐</option>
            <option value="Negative">Negative ⚠️</option>
          </select>
        </div>
        <div class="form-group">
          <label>Brief Notes</label>
          <textarea id="log-notes" rows="4" class="form-control log-textarea"
            placeholder="Summary of the conversation..."></textarea>
        </div>
        <button type="submit" class="btn-primary w-100">COMMIT TO LEDGER</button>
      </form>
    </div>
  </div>

  <!-- Modal: History -->
  <div class="modal" id="modal-history">
    <div class="glass-card modal-content modal-content-600">
      <div class="modal-header">
        <div class="modal-title">INTERACTION HISTORY</div>
        <i class="fas fa-times close-modal" onclick="closeModal('modal-history')"></i>
      </div>
      <div id="history-body" class="modal-body history-scroll">
        <!-- Injected -->
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/three-bg.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/client-connect.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      auth.requireAuth();
      auth.initNavbar();
      initThreeBg();
      initSidebar();
      if (window.initClientConnect) initClientConnect();
    });
  </script>
</body>

</html>
